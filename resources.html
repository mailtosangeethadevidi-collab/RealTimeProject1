<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevHub - Resources & Tutorials</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #f8f9fd;
            --primary-blue: #4a90e2;
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --text-main: #1a1a1a;
            --text-muted: #6b7280;
            --card-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            --tag-bg: #f1f3f5;
            --purple-btn: #8b5cf6;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg-color); 
            margin: 0; 
            color: var(--text-main); 
        }

        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }

        /* Navigation Header */
        header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 30px; }
        .back-dash { color: var(--primary-blue); text-decoration: none; font-weight: bold; font-size: 0.9rem; display: block; margin-bottom: 10px; }
        header h1 { margin: 0; font-size: 2.2rem; }
        header p { color: var(--text-muted); margin-top: 5px; }

        /* Search Section */
        .search-container { 
            background: white; padding: 15px; border-radius: 15px; 
            box-shadow: var(--card-shadow); margin-bottom: 30px; 
        }
        .search-container input { 
            width: 100%; padding: 12px; border: 1px solid #eee; 
            border-radius: 8px; outline: none; box-sizing: border-box;
        }

        /* Layout */
        .layout { display: grid; grid-template-columns: 1fr 300px; gap: 30px; }

        /* Resource Grid */
        .resource-grid { 
    display: grid; 
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); /* Reduced min-width */
    gap: 20px; 
}
        /* Resource Card */
        .res-card { 
    background: white; 
    border-radius: 12px; 
    overflow: hidden; 
    box-shadow: var(--card-shadow); 
    transition: transform 0.2s; 
    display: flex; 
    flex-direction: column;
    border: 1px solid #edf2f7; /* Subtle border for definition */
}
        .res-card:hover { transform: translateY(-5px); }
        
       .media-container { 
    width: 100%; 
    height: 140px; /* Reduced from 200px */
    background: #f1f5f9; 
    overflow: hidden; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
}
        .media-container img, .media-container video { width: 100%; height: 100%; object-fit: cover; }
        .doc-placeholder { color: white; text-align: center; }

        .res-body { 
    padding: 15px; /* Reduced padding */
    flex-grow: 1; 
}
        .res-meta { display: flex; justify-content: space-between; margin-bottom: 12px; }
        .cat-tag { background: #eef2ff; color: #4f46e5; padding: 4px 10px; border-radius: 6px; font-size: 0.75rem; font-weight: bold; }

       .res-body h3 { 
    margin: 0 0 8px 0; 
    font-size: 1.1rem; /* Slightly smaller title */
    line-height: 1.3;
}
       .res-body p { 
    font-size: 0.85rem; /* Smaller description text */
    margin-bottom: 12px;
    /* Limit description to 3 lines to keep cards uniform */
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
}        .footer-row { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-top: auto; padding-top: 10px; border-top: 1px solid #f0f0f0; 
        }
        
        .user { display: flex; align-items: center; gap: 10px; }
        .avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--primary-gradient); color: white; display: flex; align-items: center; justify-content: center; font-weight: bold;font-size: 0.8rem; }
        .user-info .user-name { font-size: 0.75rem; font-weight: 600; display: block; }
        .user-info .role-badge { font-size: 0.7rem; color: var(--text-muted); }

        /* Sidebar */
        .sidebar { background: white; padding: 25px; border-radius: 20px; box-shadow: var(--card-shadow); height: fit-content; }
        .share-btn { 
            width: 100%; padding: 15px; border: none; border-radius: 10px; 
            background: var(--primary-gradient); color: white; font-weight: bold; 
            cursor: pointer; margin-bottom: 25px; transition: opacity 0.2s;
        }
        .share-btn:hover { opacity: 0.9; }
        .cat-item { padding: 12px 0; border-bottom: 1px solid #f8f8f8; cursor: pointer; transition: 0.2s; }
        .cat-item:hover { color: var(--primary-blue); padding-left: 5px; }

        /* Modal */
        .modal-overlay { 
            position: fixed; top:0; left:0; width:100%; height:100%; 
            background: rgba(0,0,0,0.7); display:none; align-items:center; justify-content:center; z-index: 1000;
        }
        .modal-content { background: white; padding: 30px; border-radius: 15px; width: 90%; max-width: 500px; }
        .modal-input, .modal-select, .modal-textarea { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="container">
    <a href="dashboard.html" class="back-dash"><i class="fa-solid fa-arrow-left"></i> Back to Dashboard</a>
    <header>
        <div>
            <h1>Resources & Tutorials</h1>
            <p>Dynamic learning hub for the DevHub Community</p>
        </div>
    </header>

    <div class="search-container">
        <input type="text" id="resSearch" placeholder="Search by title, description, or category..." onkeyup="renderResources()">
    </div>

    <div class="layout">
        <main class="resource-grid" id="resourceGrid">
            </main>

        <aside class="sidebar">
            <button class="share-btn" onclick="openModal()"><i class="fa-solid fa-plus"></i> Share Resource</button>
            <h3>Categories</h3>
            <div class="cat-item" onclick="filterByCat('all')">All Resources</div>
            <div class="cat-item" onclick="filterByCat('Web Development')">Web Development</div>
            <div class="cat-item" onclick="filterByCat('Computer Science')">Computer Science</div>
            <div class="cat-item" onclick="filterByCat('AI/ML')">AI/ML</div>
            <div class="cat-item" onclick="filterByCat('Backend Development')">Backend Development</div>
            <div class="cat-item" onclick="filterByCat('Data Science')">Data Science</div>
           
        </aside>
    </div>
</div>

<div id="shareModal" class="modal-overlay">
    <div class="modal-content">
        <h2>Share New Resource</h2>
        <input type="text" id="resTitle" placeholder="Title" class="modal-input">
        <textarea id="resDesc" placeholder="Description" class="modal-textarea"></textarea>
        <select id="resCat" class="modal-select">
            <option value="Web Development">Web Development</option>
            <option value="Computer Science">Computer Science</option>
            <option value="AI/ML">AI/ML</option>
            <option value="Backend Development">Backend Development</option>
            <option value="Data Science">Data Science</option>
             
        </select>
        <input type="text" id="resLink" placeholder="Link (Optional)" class="modal-input">
        <label style="font-size: 0.8rem; font-weight: bold;">Attach File (PDF, Image, Video):</label>
        <input type="file" id="resFile" class="modal-input">
        
        <div style="display:flex; gap:10px;">
            <button onclick="saveResource()" style="flex:2; padding:12px; background:var(--purple-btn); color:white; border:none; border-radius:8px; cursor:pointer; font-weight:bold;">Post Resource</button>
            <button onclick="closeModal()" style="flex:1; padding:12px; background:#eee; border:none; border-radius:8px; cursor:pointer;">Cancel</button>
        </div>
    </div>
</div>

<script>
    let currentCategory = 'all';

    function openModal() { document.getElementById('shareModal').style.display = 'flex'; }
    function closeModal() { document.getElementById('shareModal').style.display = 'none'; }

   function saveResource() {
    const user = JSON.parse(localStorage.getItem('loggedInUser'));
    if (!user) return alert("Please log in to share resources");

    const title = document.getElementById('resTitle').value;
    const desc = document.getElementById('resDesc').value;
    const cat = document.getElementById('resCat').value;
    const link = document.getElementById('resLink').value;
    const fileInput = document.getElementById('resFile');

    if (!title || !desc) return alert("Please fill title and description");

    const reader = new FileReader();
    const executeSave = (fileData = null, fileType = null) => {
        const newRes = {
            id: Date.now(),
            title, 
            desc, 
            cat, 
            link, 
            fileData, 
            fileType,
            author: user.name,
            // CRITICAL: Store email so the certificate script can find your work
            userEmail: user.email, 
            date: new Date().toLocaleDateString()
        };

        // 1. Save to the resources database
        let db = JSON.parse(localStorage.getItem('devHubResources')) || [];
        db.unshift(newRes);
        localStorage.setItem('devHubResources', JSON.stringify(db));

        // 2. Increment the local user session count (for immediate UI updates)
        user.resourceCount = (user.resourceCount || 0) + 1;
        localStorage.setItem('loggedInUser', JSON.stringify(user));

        alert("Resource shared successfully!");
        renderResources();
        closeModal();
    };

    if (fileInput.files[0]) {
        reader.readAsDataURL(fileInput.files[0]);
        reader.onload = () => executeSave(reader.result, fileInput.files[0].type);
    } else {
        executeSave();
    }
}
    function renderResources() {
        const grid = document.getElementById('resourceGrid');
        const db = JSON.parse(localStorage.getItem('devHubResources')) || [];
        const searchTerm = document.getElementById('resSearch').value.toLowerCase();
        grid.innerHTML = "";

        db.filter(res => {
            const matchesCat = currentCategory === 'all' || res.cat === currentCategory;
            const matchesSearch = res.title.toLowerCase().includes(searchTerm) || res.desc.toLowerCase().includes(searchTerm);
            return matchesCat && matchesSearch;
        }).forEach(res => {
            let mediaBox = `<div class="media-container"><div class="doc-placeholder"><i class="fa-solid fa-file-lines fa-3x"></i><p>Document</p></div></div>`;
            
            if (res.fileType?.includes('image')) {
                mediaBox = `<div class="media-container"><img src="${res.fileData}"></div>`;
            } else if (res.fileType?.includes('video')) {
                mediaBox = `<div class="media-container"><video src="${res.fileData}" controls></video></div>`;
            }

            grid.innerHTML += `
                <div class="res-card">
                    ${mediaBox}
                    <div class="res-body">
                        <div class="res-meta"><span class="cat-tag">${res.cat}</span></div>
                        <h3>${res.title}</h3>
                        <p>${res.desc}</p>
                        ${res.link ? `<a href="${res.link}" target="_blank" style="color:var(--primary-blue); font-size:0.85rem; margin-bottom:15px; display:block;">🔗 Visit Link</a>` : ''}
                        <div class="footer-row">
                            <div class="user">
                                <div class="avatar">${res.author[0]}</div>
                                <div class="user-info">
                                    <span class="user-name">${res.author}</span>
                                    <span class="role-badge">Contributor</span>
                                </div>
                            </div>
                            <button onclick="openFull('${res.id}')" style="padding:6px 12px; border-radius:5px; border:1px solid #ddd; background:none; cursor:pointer;">Open</button>
                        </div>
                    </div>
                </div>
            `;
        });
    }

    function openFull(id) {
        const res = JSON.parse(localStorage.getItem('devHubResources')).find(r => r.id == id);
        if (res.fileData) {
            const win = window.open();
            win.document.write(`<iframe src="${res.fileData}" frameborder="0" style="width:100%; height:100vh;"></iframe>`);
        } else if (res.link) {
            window.open(res.link, '_blank');
        }
    }

    function filterByCat(cat) {
        currentCategory = cat;
        renderResources();
    }

    document.addEventListener('DOMContentLoaded', renderResources);
</script>

</body>
</html>
